# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: zpe2.pp003.zpe2pp003
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          url: http://bgissap3.bgissap.co.kr:8000
          client: '100'
        app:
          name: ZCDS_E2_PP_0012
          description: Production Order Dashboard
          package: ZPE2PP
          transport: EFXK902490
        exclude:
          - /test/
